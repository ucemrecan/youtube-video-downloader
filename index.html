<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube Downloader</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #f5f5f5;
      }
      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      h3 {
        text-transform: uppercase;
        margin-bottom: 20px;
        color: #333;
      }
      form {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 10px;
        outline: none;
      }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 5px;
        background-color: #4caf50;
        color: #fff;
        cursor: pointer;
        outline: none;
      }
      button:hover {
        background-color: #45a049;
      }
      button:active {
        background-color: #3e8e41;
      }
      #info {
        width: 100%;
        max-width: 500px;
        height: 20px;
        border-radius: 5px;
        margin-top: 20px;
        display: none;
      }
      #info-text {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        color: #4caf50;
        text-transform: capitalize;
      }
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 10px;
        outline: none;
      }
      option {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-bottom: 10px;
        outline: none;
      }
      label {
        margin-left: 5px;
        margin-bottom: 10px;
        color: #333;
        text-align: left;
      }
      .quality-field,
      .format-field {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form action="/" method="post" ?>
        <h3>Youtube Downloader</h3>
        <input
          type="text"
          name="url"
          placeholder="Enter youtube url link here"
          required
        />

        <div class="quality-field">
          <label for="quality">Select Video's Quality</label>
          <select name="quality" id="quality">
            <option value="highest">Highest</option>
            <option value="lowest">Lowest</option>
            <option value="highestaudio">Highest Audio</option>
            <option value="lowestaudio">Lowest Audio</option>
            <option value="highestvideo">Highest Video</option>
            <option value="lowestvideo">Lowest Video</option>
          </select>
        </div>

        <div class="format-field">
          <label for="format">Select Video's Format</label>
          <select name="format" id="format">
            <option value="mp4">MP4</option>
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="aac">AAC</option>
            <option value="webm">WEBM</option>
            <option value="ogg">OGG</option>
            <option value="m4a">M4A</option>
            <option value="flv">FLV</option>
            <option value="3gp">3GP</option>
          </select>
        </div>
        <button id="btn" type="submit">Download</button>
      </form>
      <div id="info">
        <h3 id="info-text"></h3>
      </div>
    </div>
    <script>
      const btn = document.getElementById("btn");
      const info = document.getElementById("info");
      const infoText = document.getElementById("info-text");

      btn.addEventListener("click", () => {
        info.style.display = "block";
        infoText.innerHTML = "Video downloading...";
      });
    </script>
  </body>
</html>
